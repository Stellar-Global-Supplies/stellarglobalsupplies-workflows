name: Deploy Platform

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  TF_VERSION: "1.7.0"
  LAMBDA_PREFIX: stellar-wf-prod

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  changes:
    name: Detect Changed Areas
    runs-on: ubuntu-latest
    outputs:
      infra: ${{ steps.filter.outputs.infra }}
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            infra:
              - 'terraform/**'
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'

  terraform:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: changes
    outputs:
      frontend_bucket: ${{ steps.outputs.outputs_frontend_bucket }}
      cloudfront_distribution_id: ${{ steps.outputs.outputs_cloudfront_distribution_id }}
      api_endpoint: ${{ steps.outputs.outputs_api_endpoint }}
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v4

      - name: Debug GitHub Context
        run: |
          echo "repository=${GITHUB_REPOSITORY}"
          echo "ref=${GITHUB_REF}"
          echo "workflow=${GITHUB_WORKFLOW}"
          echo "job=${GITHUB_JOB}"
          echo "role_arn=${{ secrets.AWS_ROLE_ARN }}"

      - name: Debug OIDC Claims
        shell: bash
        run: |
          set -euo pipefail
          token_json="$(curl -sSf -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=sts.amazonaws.com")"
          token="$(echo "$token_json" | jq -r '.value')"
          python3 - <<'PY' "$token"
          import base64, json, sys
          token = sys.argv[1]
          payload = token.split(".")[1]
          payload += "=" * (-len(payload) % 4)
          decoded = json.loads(base64.urlsafe_b64decode(payload).decode())
          print(json.dumps({
              "aud": decoded.get("aud"),
              "sub": decoded.get("sub"),
              "repository": decoded.get("repository"),
              "ref": decoded.get("ref"),
              "workflow": decoded.get("workflow"),
              "job_workflow_ref": decoded.get("job_workflow_ref"),
          }, indent=2))
          PY

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume:    ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: observe-bootstrap
          aws-region:        ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Format Check
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        if: needs.changes.outputs.infra == 'true'
        run: |
          terraform plan -out=tfplan \
            -var="supabase_url=${{ secrets.SUPABASE_URL }}" \
            -var="supabase_service_key=${{ secrets.SUPABASE_SERVICE_KEY }}" \
            -var="acm_certificate_arn=${{ secrets.ACM_CERT_ARN }}" \
            -var="website_repo_owner=${{ secrets.WEBSITE_REPO_OWNER }}" \
            -var="website_repo_name=${{ secrets.WEBSITE_REPO_NAME }}" \
            -no-color

      - name: Terraform Apply
        if: needs.changes.outputs.infra == 'true'
        run: terraform apply -auto-approve tfplan

      - name: Seed SSM Parameters
        if: needs.changes.outputs.infra == 'true'
        env:
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_ACCESS_TOKEN: ${{ secrets.FB_ACCESS_TOKEN }}
          IG_ACCOUNT_ID: ${{ secrets.IG_ACCOUNT_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          TOKEN_PAT: ${{ secrets.TOKEN_PAT }}
          HUNTER_API_KEY: ${{ secrets.HUNTER_API_KEY }}
        run: |
          chmod +x ../docs/setup-ssm-params.sh
          ../docs/setup-ssm-params.sh
        shell: bash

      - name: Export Outputs
        id: outputs
        if: needs.changes.outputs.infra == 'true'
        run: |
          echo "outputs_frontend_bucket=$(terraform output -raw frontend_bucket)" >> "$GITHUB_OUTPUT"
          echo "outputs_cloudfront_distribution_id=$(terraform output -raw cloudfront_distribution_id)" >> "$GITHUB_OUTPUT"
          echo "outputs_api_endpoint=$(terraform output -raw api_endpoint)" >> "$GITHUB_OUTPUT"
          echo "outputs_assets_cloudfront_domain=$(terraform output -raw assets_cloudfront_domain)" >> "$GITHUB_OUTPUT"
          terraform output -json > tf_outputs.json

  backend:
    name: Package & Deploy Lambdas
    runs-on: ubuntu-latest
    needs: [changes, terraform]
    steps:
      - uses: actions/checkout@v4

      - name: Debug GitHub Context
        run: |
          echo "repository=${GITHUB_REPOSITORY}"
          echo "ref=${GITHUB_REF}"
          echo "workflow=${GITHUB_WORKFLOW}"
          echo "job=${GITHUB_JOB}"
          echo "role_arn=${{ secrets.AWS_ROLE_ARN }}"

      - name: Debug OIDC Claims
        shell: bash
        run: |
          set -euo pipefail
          token_json="$(curl -sSf -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=sts.amazonaws.com")"
          token="$(echo "$token_json" | jq -r '.value')"
          python3 - <<'PY' "$token"
          import base64, json, sys
          token = sys.argv[1]
          payload = token.split(".")[1]
          payload += "=" * (-len(payload) % 4)
          decoded = json.loads(base64.urlsafe_b64decode(payload).decode())
          print(json.dumps({
              "aud": decoded.get("aud"),
              "sub": decoded.get("sub"),
              "repository": decoded.get("repository"),
              "ref": decoded.get("ref"),
              "workflow": decoded.get("workflow"),
              "job_workflow_ref": decoded.get("job_workflow_ref"),
          }, indent=2))
          PY

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume:    ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: observe-bootstrap
          aws-region:        ${{ env.AWS_REGION }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies into package dir
        if: needs.changes.outputs.backend == 'true'
        working-directory: backend
        run: |
          mkdir -p package
          cp -r lambdas/* package/

      - name: Zip package
        if: needs.changes.outputs.backend == 'true'
        working-directory: backend
        run: |
          cd package
          zip -r ../lambda_package.zip . -x "**/__pycache__/*" -x "**/*.pyc"

      - name: Update Lambda functions
        if: needs.changes.outputs.backend == 'true'
        run: |
          FUNCTIONS=(
            "generate-leads"      "check-duplicate"    "save-lead"
            "draft-email"         "create-approval"    "send-email"
            "schedule-followup"   "get-orders"         "generate-post"
            "post-to-platforms"   "read-s3-context"    "generate-blog"
            "create-github-pr"    "workflow-trigger"   "approval-handler"
            "data-handler"
          )
          for fn in "${FUNCTIONS[@]}"; do
            echo "Updating ${LAMBDA_PREFIX}-${fn}…"
            aws lambda update-function-code \
              --function-name "${LAMBDA_PREFIX}-${fn}" \
              --zip-file "fileb://backend/lambda_package.zip" \
              --no-cli-pager || echo "⚠ ${fn} not found, skipping"
          done

      - name: Wait for all updates to complete
        if: needs.changes.outputs.backend == 'true'
        run: |
          FUNCTIONS=(
            "generate-leads" "check-duplicate" "save-lead" "draft-email"
            "create-approval" "send-email" "schedule-followup" "get-orders"
            "generate-post" "post-to-platforms" "read-s3-context"
            "generate-blog" "create-github-pr" "workflow-trigger"
            "approval-handler" "data-handler"
          )
          for fn in "${FUNCTIONS[@]}"; do
            aws lambda wait function-updated \
              --function-name "${LAMBDA_PREFIX}-${fn}" \
              --no-cli-pager 2>/dev/null || true
          done
          echo "✅ All Lambda functions updated"

      - name: Publish new versions
        if: needs.changes.outputs.backend == 'true'
        run: |
          FUNCTIONS=("workflow-trigger" "approval-handler" "data-handler")
          for fn in "${FUNCTIONS[@]}"; do
            aws lambda publish-version \
              --function-name "${LAMBDA_PREFIX}-${fn}" \
              --description "Deploy ${{ github.sha }}" \
              --no-cli-pager || true
          done

  frontend:
    name: Build React App & Deploy
    runs-on: ubuntu-latest
    needs: [changes, terraform, backend]
    steps:
      - uses: actions/checkout@v4

      - name: Debug GitHub Context
        run: |
          echo "repository=${GITHUB_REPOSITORY}"
          echo "ref=${GITHUB_REF}"
          echo "workflow=${GITHUB_WORKFLOW}"
          echo "job=${GITHUB_JOB}"
          echo "role_arn=${{ secrets.AWS_ROLE_ARN }}"

      - name: Debug OIDC Claims
        shell: bash
        run: |
          set -euo pipefail
          token_json="$(curl -sSf -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=sts.amazonaws.com")"
          token="$(echo "$token_json" | jq -r '.value')"
          python3 - <<'PY' "$token"
          import base64, json, sys
          token = sys.argv[1]
          payload = token.split(".")[1]
          payload += "=" * (-len(payload) % 4)
          decoded = json.loads(base64.urlsafe_b64decode(payload).decode())
          print(json.dumps({
              "aud": decoded.get("aud"),
              "sub": decoded.get("sub"),
              "repository": decoded.get("repository"),
              "ref": decoded.get("ref"),
              "workflow": decoded.get("workflow"),
              "job_workflow_ref": decoded.get("job_workflow_ref"),
          }, indent=2))
          PY

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume:    ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: observe-bootstrap
          aws-region:        ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Resolve Deployment Outputs
        run: |
          terraform -chdir=terraform init
          FRONTEND_S3_BUCKET="${{ needs.terraform.outputs.frontend_bucket }}"
          CLOUDFRONT_DISTRIBUTION_ID="${{ needs.terraform.outputs.cloudfront_distribution_id }}"
          API_GATEWAY_URL="${{ needs.terraform.outputs.api_endpoint }}"

          if [ -z "$FRONTEND_S3_BUCKET" ]; then
            FRONTEND_S3_BUCKET="$(terraform -chdir=terraform output -raw frontend_bucket)"
          fi
          if [ -z "$CLOUDFRONT_DISTRIBUTION_ID" ]; then
            CLOUDFRONT_DISTRIBUTION_ID="$(terraform -chdir=terraform output -raw cloudfront_distribution_id)"
          fi
          if [ -z "$API_GATEWAY_URL" ]; then
            API_GATEWAY_URL="$(terraform -chdir=terraform output -raw api_endpoint)"
          fi

          echo "FRONTEND_S3_BUCKET=$FRONTEND_S3_BUCKET" >> "$GITHUB_ENV"
          echo "CLOUDFRONT_DISTRIBUTION_ID=$CLOUDFRONT_DISTRIBUTION_ID" >> "$GITHUB_ENV"
          echo "API_GATEWAY_URL=$API_GATEWAY_URL" >> "$GITHUB_ENV"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package.json

      - name: Install dependencies
        if: needs.changes.outputs.frontend == 'true'
        working-directory: frontend
        run: npm ci

      - name: Write .env
        if: needs.changes.outputs.frontend == 'true'
        working-directory: frontend
        run: |
          cat > .env.production << EOF
          VITE_SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
          VITE_API_URL=${{ env.API_GATEWAY_URL }}
          EOF

      - name: Build
        if: needs.changes.outputs.frontend == 'true'
        working-directory: frontend
        run: npm run build

      - name: Deploy to S3
        if: needs.changes.outputs.frontend == 'true'
        working-directory: frontend
        run: |
          BUCKET="${{ env.FRONTEND_S3_BUCKET }}"

          aws s3 sync dist/assets s3://${BUCKET}/assets \
            --cache-control "public,max-age=31536000,immutable" \
            --delete \
            --no-cli-pager

          aws s3 sync dist s3://${BUCKET} \
            --exclude "assets/*" \
            --cache-control "public,max-age=0,must-revalidate" \
            --delete \
            --no-cli-pager

      - name: Invalidate CloudFront cache
        if: needs.changes.outputs.frontend == 'true'
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ env.CLOUDFRONT_DISTRIBUTION_ID }}" \
            --paths "/*" \
            --no-cli-pager
          echo "✅ CloudFront cache invalidated"

      - name: Print deployment URL
        if: needs.changes.outputs.frontend == 'true'
        run: echo "🚀 Deployed → https://workflow.stellarglobalsupplies.com"
